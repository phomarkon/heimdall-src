# Server-only vLLM stack for UCloud B200 machines.
# Do not run this on a laptop: it pulls a large vLLM image and model weights.

services:
  llm-society:
    image: ${VLLM_IMAGE:-vllm/vllm-openai:latest}
    container_name: heimdall-llm-society
    ipc: host
    shm_size: 16gb
    ports:
      - "${HEIMDALL_VLLM_PORT:-8008}:8000"
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:-}
      HF_HOME: /root/.cache/huggingface
      VLLM_USE_V1: ${VLLM_USE_V1:-1}
    volumes:
      - ${HEIMDALL_HF_CACHE:-~/.cache/huggingface}:/root/.cache/huggingface
    gpus: all
    command:
      - --model
      - ${HEIMDALL_SOCIETY_MODEL_ID:-Qwen/Qwen3.6-35B-A3B-FP8}
      - --served-model-name
      - ${HEIMDALL_SERVED_MODEL_NAME:-heimdall-society}
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --tensor-parallel-size
      - ${VLLM_TENSOR_PARALLEL_SIZE:-1}
      - --max-model-len
      - ${VLLM_MAX_MODEL_LEN:-8192}
      - --gpu-memory-utilization
      - ${VLLM_GPU_MEMORY_UTILIZATION:-0.85}
      - --trust-remote-code
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/v1/models', timeout=5).read()"
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 180s


[project]
name = "heimdall-markets"
version = "0.0.1"
description = "Nordic mFRR / DA / ID market math used by both verifier and simulator."
requires-python = ">=3.12,<3.13"
dependencies = [
  "heimdall-contracts",
  "numpy>=1.26",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/heimdall_markets"]

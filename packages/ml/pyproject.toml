[project]
name = "heimdall-ml"
version = "0.0.1"
description = "Shared ML utilities for Heimdall: split-CP, ACI, seeds, MLflow tracking, eval metrics, XAI."
requires-python = ">=3.12,<3.13"
dependencies = [
  "numpy>=1.26",
  "scipy>=1.13",
  "scikit-learn>=1.5",
  "mlflow>=2.16",
  "shap>=0.48",
  "lime>=0.2.0.1",
  # Pin numba/llvmlite to versions that support Python 3.12.
  "numba>=0.60",
  "llvmlite>=0.43",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/heimdall_ml"]

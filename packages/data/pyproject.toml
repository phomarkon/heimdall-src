[project]
name = "heimdall-data"
version = "0.0.1"
description = "Data ingestion + tidy panel loaders for DK1/DK2 mFRR forecasters (per docs/RESEARCH-PROPOSAL.md §5.1)."
requires-python = ">=3.12,<3.13"
dependencies = [
  "polars>=1.0",
  "pyarrow>=15",
  "entsoe-py>=0.8",
  "requests>=2.32",
  "tenacity>=8",
  "pandas>=2.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/heimdall_data"]

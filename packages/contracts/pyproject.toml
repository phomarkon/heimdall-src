[project]
name = "heimdall-contracts"
version = "0.0.1"
description = "Pydantic v2 schemas shared across Heimdall services. See docs/RESEARCH-PROPOSAL.md Appendix B."
requires-python = ">=3.12,<3.13"
dependencies = [
  "pydantic>=2.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/heimdall_contracts"]
